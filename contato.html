<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Contato | Reinos das Sombras</title>
  <link rel="stylesheet" href="assets/style.css">
  <link rel="stylesheet" href="assets/cookies.css">
<script src="assets/cookies.js"></script>
</head>
<body>

<div class="site-shell">

<header class="site-header compact">
    <div class="container header-inner">
      <a class="brand" href="/">
        <div class="brand-title">REINOS DAS SOMBRAS</div>
        <div class="brand-sub">ADENTRE A ESCURIDÃO</div>
      </a>

      <nav class="nav">
        <a href="/" class="nav-link">PÁGINA INICIAL</a>
        <a href="/#explorar" class="nav-link">COMECE A EXPLORAR</a>
        <a href="/#sobre" class="nav-link">SOBRE NÓS</a>
        <a href="contato.html" class="nav-link">CONTATO</a>
      </nav>

      <div class="actions">
        <a class="icon-btn" href="/" aria-label="Voltar">←</a>
      </div>
    </div>
  </header>



<main class="contact-container">
  <section class="contact-form">
    <h1 class="contact-title">Contato</h1>
    <p class="contact-subtitle">
      Envie sua mensagem. Eu leio tudo, mas posso demorar um pouco pra responder.
    </p>

    <form id="contactForm" class="contact-form-inner">
      <div class="form-group">
        <label>Nome</label>
        <input type="text" name="nome" required>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" required>
      </div>

      <div class="form-group">
        <label>Assunto</label>
        <input type="text" name="assunto" required>
      </div>

      <div class="form-group">
        <label>Mensagem</label>
        <textarea name="mensagem" rows="6" required></textarea>
      </div>

      <button type="submit" class="btn-primary">Enviar</button>

      <p id="formStatus" class="form-status" aria-live="polite"></p>
    </form>
  </section>
</main>

<script src="assets/contact.js"></script>

</div>
</body>
</html>
